<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ySaHUB - Oyna & Kazan</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a10; --panel-bg: #151522; --neon-cyan: #00f3ff;
            --neon-purple: #b026ff; --text-light: #e0e0e0; --text-muted: #8b8b9e;
            --error-red: #ff3b30;
        }

        body {
            font-family: 'Inter', sans-serif; background-color: var(--bg-dark);
            color: var(--text-light); margin: 0; padding: 20px; box-sizing: border-box;
            background-image: radial-gradient(circle at top right, rgba(0, 243, 255, 0.05), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(176, 38, 255, 0.05), transparent 40%);
        }

        .container {
            max-width: 100%; background-color: var(--panel-bg); border-radius: 16px;
            padding: 25px; border: 1px solid rgba(0, 243, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.05); position: relative; overflow: hidden;
        }

        .container::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple));
        }

        h2 { 
            font-family: 'Rajdhani', sans-serif; font-size: 28px; margin-top: 0; 
            color: #ffffff; text-transform: uppercase; text-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
        }
        
        p { color: var(--text-muted); font-size: 14px; margin-bottom: 25px; line-height: 1.5; }

        .form-group { margin-bottom: 18px; }
        
        label { 
            display: block; margin-bottom: 8px; font-size: 13px; font-weight: 500; 
            color: var(--neon-cyan); text-transform: uppercase;
        }
        
        input {
            width: 100%; padding: 14px; box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px;
            background-color: rgba(0, 0, 0, 0.5); color: #ffffff;
            font-size: 15px; outline: none; transition: all 0.3s ease; font-family: 'Inter', sans-serif;
        }
        
        input:focus { 
            border-color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0, 243, 255, 0.2); 
        }

        button {
            width: 100%; padding: 16px; margin-top: 15px;
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-cyan));
            color: #ffffff; border: none; border-radius: 8px; 
            font-size: 16px; font-weight: 700; font-family: 'Rajdhani', sans-serif;
            text-transform: uppercase; cursor: pointer; transition: all 0.3s;
        }
        
        button:active { transform: scale(0.98); }

        .error-message { color: var(--error-red); font-size: 12px; display: none; margin-top: 6px; }

        .dashboard-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 15px; margin-bottom: 20px;
        }

        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .dashboard-card {
            background-color: rgba(0, 0, 0, 0.3); padding: 20px; border-radius: 12px; 
            text-align: center; border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .dashboard-card h3 { margin: 0; font-size: 18px; font-family: 'Rajdhani', sans-serif; color: #ffffff; }
        .dashboard-card p { margin: 8px 0 0; font-size: 13px; color: var(--neon-cyan); font-weight: bold; }

        #dashboard-section { display: none; }
    </style>
</head>
<body>

    <div class="container" id="register-section">
        <h2>Sistem Kaydı</h2>
        <div class="form-group">
            <label>Kullanıcı Adı / İsim Soyisim</label>
            <input type="text" id="fullname" required>
        </div>
        <div class="form-group">
            <label>Telefon Numarası</label>
            <input type="tel" id="phone" placeholder="05XXXXXXXXX" required>
        </div>
        <div class="form-group">
            <label>E-posta Adresi</label>
            <input type="email" id="email" required>
        </div>
        <button onclick="submitRegister()">Sisteme Entegre Ol</button>
    </div>

    <div class="container" id="dashboard-section">
        <div class="dashboard-header">
            <h2>ySaHUB Paneli</h2>
        </div>
        <p>Sistem aktif. Veri akışı sağlanıyor.</p>
        <div class="dashboard-grid">
            <div class="dashboard-card"><h3>Bakiye</h3><p>0.00 TL</p></div>
            <div class="dashboard-card"><h3>Seviye</h3><p>1. Seviye</p></div>
            <div class="dashboard-card"><h3>Görevler</h3><p>Veri Bekleniyor</p></div>
            <div class="dashboard-card"><h3>Profil</h3><p>Ayarlar</p></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); tg.setHeaderColor('#0a0a10'); tg.setBackgroundColor('#0a0a10');

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const isRegistered = urlParams.get('reg');

            if (isRegistered === '1') {
                document.getElementById('register-section').style.display = 'none';
                document.getElementById('dashboard-section').style.display = 'block';
            }
        };

        function submitRegister() {
            const fullname = document.getElementById('fullname').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const email = document.getElementById('email').value.trim();
            if(fullname && phone && email) {
                tg.sendData(JSON.stringify({ action: "register", fullname: fullname, phone: phone, email: email }));
            }
        }
    </script>
</body>
</html>
